# .github/workflows/ci.yml
name: CI Frontend

on:
  push:
    branches: ['**']
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'next.config.*'
      - '.eslintrc*'
      - '.prettierrc*'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'next.config.*'
      - '.eslintrc*'
      - '.prettierrc*'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

  # ── 2. TypeScript ──────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  # ── 3. Tests ───────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci

      - name: Vitest
        run: npm run test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ── 4. Quality gate ────────────────────────────────────────────────────
  quality-gate:
    name: Quality gate 1
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.typecheck.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" ]]; then
            echo "Quality gate failed"
            echo "  lint:      ${{ needs.lint.result }}"
            echo "  typecheck: ${{ needs.typecheck.result }}"
            echo "  test:      ${{ needs.test.result }}"
            exit 1
          fi
          echo "All checks passed"

  # ── 5. Smoke test post-déploiement ─────────────────────────────────────
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: [quality-gate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Wait for Vercel deploy
        run: sleep 30

      - name: Check /api/health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://pme-copilot-six.vercel.app/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "/api/health returned $STATUS"
            exit 1
          fi
          echo "/api/health OK ($STATUS)"

      - name: Check response time
        run: |
          TIME=$(curl -s -o /dev/null -w "%{time_total}" \
            https://pme-copilot-six.vercel.app/api/health)
          echo "Response time: ${TIME}s"
          # Alerte si > 2s
          if (( $(echo "$TIME > 2.0" | bc -l) )); then
            echo "Response time ${TIME}s exceeds 2s threshold"
            exit 1
          fi
          echo "Response time OK (${TIME}s)"
