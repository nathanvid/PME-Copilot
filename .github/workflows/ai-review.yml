name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**.ts'
      - '**.tsx'
      - '**.js'
      - '**.jsx'

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD \
            -- '*.ts' '*.tsx' '*.js' '*.jsx' \
            ':!*.d.ts' \
            ':!**/*.test.*' \
            ':!**/node_modules/**' \
            > diff.txt

          # Truncate if too large (Claude context limit safety)
          wc -l diff.txt
          head -c 80000 diff.txt > diff_truncated.txt

      - name: Send to Claude API
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python3 .github/scripts/call_openrouter.py

